<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Стартовый сигнал гонок</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --panel-bg: #13132b;
            --text: #e0e0e0;
            --text-secondary: #9a9ab8;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --input-bg: #1a1a2e;
            --input-border: #2a2a4a;
            --card-bg: #0a0f2c;
            --shadow: 0 6px 24px rgba(0,0,0,0.6);
            --red-on: #ff1a1a;
            --red-glow: #ff0000;
            --yellow-on: #ffcc00;
            --yellow-glow: #ffaa00;
            --green-on: #00ff41;
            --green-glow: #00ff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(ellipse at center, #1a1a3e 0%, #050510 80%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 420px;
        }

        /* Заголовок */
        .title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(233,68,96,0.4);
            line-height: 1.3;
        }
        .title .icon {
            display: inline-block;
            font-size: 1.8rem;
            animation: pulse-icon 1.8s ease-in-out infinite;
        }
        @keyframes pulse-icon {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Светофор (уменьшенный масштаб) */
        .traffic-light {
            background: linear-gradient(180deg, #19192e 0%, #12122a 100%);
            border: 3px solid #2e2e4a;
            border-radius: 22px;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.02);
            position: relative;
        }
        .traffic-light::before,
        .traffic-light::after {
            content: '';
            position: absolute;
            top: -10px;
            width: 24px;
            height: 12px;
            background: #2e2e4a;
            border-radius: 6px 6px 0 0;
        }
        .traffic-light::before { left: 30px; }
        .traffic-light::after { right: 30px; }

        /* Лампы */
        .light {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: #0a0a18;
            border: 3px solid #2a2a44;
            position: relative;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            box-shadow: inset 0 3px 12px rgba(0,0,0,0.8), 0 3px 10px rgba(0,0,0,0.6);
            cursor: default;
        }
        .light::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 14px;
            width: 22px;
            height: 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            transform: rotate(-30deg);
            transition: all 0.25s;
        }

        /* Активные состояния */
        .light.red.active {
            background: radial-gradient(ellipse at 40% 35%, #ff5c5c, var(--red-on) 50%, #8b0000 100%);
            border-color: #ff4444;
            box-shadow: inset 0 0 25px rgba(255,100,100,0.6), 0 0 35px var(--red-glow), 0 0 70px rgba(255,0,0,0.5), 0 4px 15px rgba(0,0,0,0.5);
            animation: glow-red 0.8s ease-in-out infinite;
        }
        .light.red.active::after {
            background: rgba(255,255,255,0.2);
            width: 26px;
            height: 16px;
            top: 8px;
            left: 12px;
        }
        @keyframes glow-red {
            0%,100% { box-shadow: inset 0 0 25px rgba(255,100,100,0.6), 0 0 35px var(--red-glow), 0 0 70px rgba(255,0,0,0.5), 0 4px 15px rgba(0,0,0,0.5); }
            50% { box-shadow: inset 0 0 35px rgba(255,140,140,0.8), 0 0 55px var(--red-glow), 0 0 100px rgba(255,0,0,0.7), 0 4px 15px rgba(0,0,0,0.5); }
        }

        .light.yellow.active {
            background: radial-gradient(ellipse at 40% 35%, #ffe680, var(--yellow-on) 50%, #996600 100%);
            border-color: #ffbb33;
            box-shadow: inset 0 0 25px rgba(255,200,50,0.6), 0 0 35px var(--yellow-glow), 0 0 70px rgba(255,170,0,0.5), 0 4px 15px rgba(0,0,0,0.5);
            animation: glow-yellow 0.7s ease-in-out infinite;
        }
        .light.yellow.active::after {
            background: rgba(255,255,255,0.25);
            width: 26px;
            height: 16px;
            top: 8px;
            left: 12px;
        }
        @keyframes glow-yellow {
            0%,100% { box-shadow: inset 0 0 25px rgba(255,200,50,0.6), 0 0 35px var(--yellow-glow), 0 0 70px rgba(255,170,0,0.5), 0 4px 15px rgba(0,0,0,0.5); }
            50% { box-shadow: inset 0 0 35px rgba(255,230,80,0.8), 0 0 55px var(--yellow-glow), 0 0 100px rgba(255,170,0,0.7), 0 4px 15px rgba(0,0,0,0.5); }
        }

        .light.green.active {
            background: radial-gradient(ellipse at 40% 35%, #7fff7f, var(--green-on) 50%, #006600 100%);
            border-color: #33ff55;
            box-shadow: inset 0 0 25px rgba(100,255,100,0.6), 0 0 35px var(--green-glow), 0 0 70px rgba(0,255,0,0.5), 0 4px 15px rgba(0,0,0,0.5);
            animation: glow-green 0.5s ease-in-out infinite;
        }
        .light.green.active::after {
            background: rgba(255,255,255,0.3);
            width: 26px;
            height: 16px;
            top: 8px;
            left: 12px;
        }
        @keyframes glow-green {
            0%,100% { box-shadow: inset 0 0 25px rgba(100,255,100,0.6), 0 0 35px var(--green-glow), 0 0 70px rgba(0,255,0,0.5), 0 4px 15px rgba(0,0,0,0.5); }
            50% { box-shadow: inset 0 0 35px rgba(160,255,160,0.9), 0 0 60px var(--green-glow), 0 0 110px rgba(0,255,0,0.8), 0 4px 15px rgba(0,0,0,0.5); }
        }

        /* Статус */
        .status {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            min-height: 28px;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        .status.go {
            color: #00ff41;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 3px;
            animation: blink-status 0.35s ease-in-out 3;
        }
        @keyframes blink-status {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .status.ready { color: #ff6666; }
        .status.set { color: #ffcc44; }

        /* Обратный отсчёт */
        .countdown-display {
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            color: #ffffff;
            letter-spacing: 2px;
            min-height: 36px;
            transition: all 0.2s;
        }
        .countdown-display.warning {
            color: #ffcc00;
            animation: pulse-text 0.5s ease-in-out infinite;
        }
        .countdown-display.go {
            color: #00ff41;
            font-size: 2rem;
            animation: pulse-text 0.3s ease-in-out 4;
        }
        @keyframes pulse-text {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Панель параметров */
        .panel {
            background: var(--panel-bg);
            border: 2px solid #2a2a4a;
            border-radius: 16px;
            padding: 18px 20px;
            width: 100%;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .panel-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 2px;
        }
        .param-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }
        .param-row label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #c0c0d0;
            white-space: nowrap;
            min-width: 90px;
        }
        .param-row input[type="number"] {
            flex: 1;
            min-width: 70px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px solid var(--input-border);
            background: var(--input-bg);
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.25s;
            outline: none;
            font-family: inherit;
            letter-spacing: 0.5px;
        }
        .param-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(233,68,96,0.15);
            background: #1e1e38;
        }
        .param-unit {
            font-size: 0.75rem;
            color: #777;
            min-width: 28px;
            text-align: left;
        }

        /* Чекбокс */
        .checkbox-row {
            justify-content: flex-start;
            gap: 12px;
        }
        .checkbox-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
            transform: scale(1.1);
            cursor: pointer;
        }
        .checkbox-row label {
            cursor: pointer;
            min-width: auto;
            font-size: 0.9rem;
            color: #d0d0e0;
        }

        /* Кнопки */
        .button-row {
            display: flex;
            gap: 10px;
            width: 100%;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .btn {
            flex: 1;
            min-width: 110px;
            padding: 14px 22px;
            border-radius: 14px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .btn:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }
        /* Увеличенная кнопка СТАРТ */
        .btn-start {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 8px 24px rgba(233,68,96,0.5);
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            padding: 18px 28px;
            border-radius: 16px;
            min-width: 160px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .btn-start:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 10px 32px rgba(233,68,96,0.7);
            transform: translateY(-3px);
        }
        .btn-start:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            text-shadow: none;
        }
        .btn-reset {
            background: transparent;
            color: #c0c0d0;
            border: 2px solid #3a3a55;
            font-size: 1rem;
            padding: 14px 22px;
        }
        .btn-reset:hover:not(:disabled) {
            background: rgba(255,255,255,0.05);
            border-color: #5a5a7a;
            color: #fff;
            transform: translateY(-2px);
        }
        .btn-reset:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Адаптация для очень маленьких экранов */
        @media (max-width: 480px) {
            .container {
                gap: 15px;
                max-width: 100%;
            }
            .light {
                width: 70px;
                height: 70px;
            }
            .traffic-light {
                padding: 12px 10px;
                gap: 8px;
                border-radius: 18px;
            }
            .traffic-light::before,
            .traffic-light::after {
                width: 20px;
                height: 10px;
                top: -8px;
            }
            .traffic-light::before { left: 22px; }
            .traffic-light::after { right: 22px; }
            .title {
                font-size: 1.3rem;
                letter-spacing: 1px;
            }
            .panel {
                padding: 14px 12px;
                gap: 8px;
            }
            .param-row label {
                font-size: 0.75rem;
                min-width: 70px;
            }
            .param-row input[type="number"] {
                padding: 6px 8px;
                font-size: 0.8rem;
            }
            .btn-start {
                font-size: 1.2rem;
                padding: 15px 20px;
                min-width: 130px;
            }
            .btn-reset {
                font-size: 0.9rem;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <span class="icon">🏁</span> Стартовый сигнал
        </div>

        <!-- Светофор -->
        <div class="traffic-light" id="trafficLight">
            <div class="light red" id="lightRed"></div>
            <div class="light yellow" id="lightYellow"></div>
            <div class="light green" id="lightGreen"></div>
        </div>

        <div class="status" id="statusText">Нажмите «СТАРТ»</div>
        <div class="countdown-display" id="countdownDisplay"></div>

        <!-- Панель параметров -->
        <div class="panel">
            <div class="panel-title">⚙️ Параметры случайной задержки</div>
            <div class="param-row">
                <label for="minDelay">Мин. задержка:</label>
                <input type="number" id="minDelay" value="1.5" min="0.1" max="30" step="0.1" placeholder="1.5">
                <span class="param-unit">сек</span>
            </div>
            <div class="param-row">
                <label for="maxDelay">Макс. задержка:</label>
                <input type="number" id="maxDelay" value="5.0" min="0.2" max="30" step="0.1" placeholder="5.0">
                <span class="param-unit">сек</span>
            </div>
            <div class="param-row">
                <label for="fixedDelay">Фикс. пауза (🔴→🟡):</label>
                <input type="number" id="fixedDelay" value="1.2" min="0.1" max="10" step="0.1" placeholder="1.2">
                <span class="param-unit">сек</span>
            </div>
            <div class="param-row checkbox-row">
                <label for="wakeLockCheck">Блокировка экрана</label>
                <input type="checkbox" id="wakeLockCheck">
            </div>
            <div class="button-row">
                <button class="btn btn-start" id="btnStart">🚦 Старт</button>
                <button class="btn btn-reset" id="btnReset">↺ Сброс</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const lightRed = document.getElementById('lightRed');
            const lightYellow = document.getElementById('lightYellow');
            const lightGreen = document.getElementById('lightGreen');
            const statusText = document.getElementById('statusText');
            const countdownDisplay = document.getElementById('countdownDisplay');
            const btnStart = document.getElementById('btnStart');
            const btnReset = document.getElementById('btnReset');
            const inputMinDelay = document.getElementById('minDelay');
            const inputMaxDelay = document.getElementById('maxDelay');
            const inputFixedDelay = document.getElementById('fixedDelay');
            const wakeLockCheck = document.getElementById('wakeLockCheck');

            let isRunning = false;
            let timers = [];
            let countdownInterval = null;
            let countdownTarget = 0;

            // === Wake Lock управление ===
            let wakeLock = null;
            const wakeLockSupported = 'wakeLock' in navigator;

            if (!wakeLockSupported) {
                wakeLockCheck.disabled = true;
                wakeLockCheck.parentElement.style.opacity = '0.5';
                wakeLockCheck.title = 'API блокировки экрана не поддерживается вашим браузером';
                console.warn('Wake Lock API не поддерживается.');
            }

            async function requestWakeLock() {
                if (!wakeLockSupported || !wakeLockCheck.checked) return;
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock активирован');
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock освобождён системой');
                        wakeLock = null;
                        if (wakeLockCheck.checked) {
                            // Попытаемся восстановить, если чекбокс всё ещё включён
                            requestWakeLock();
                        }
                    });
                } catch (err) {
                    console.warn('Ошибка запроса Wake Lock:', err);
                    wakeLockCheck.checked = false;
                }
            }

            async function releaseWakeLock() {
                if (wakeLock) {
                    await wakeLock.release();
                    wakeLock = null;
                    console.log('Wake Lock отпущен вручную');
                }
            }

            wakeLockCheck.addEventListener('change', () => {
                if (wakeLockCheck.checked) {
                    requestWakeLock();
                } else {
                    releaseWakeLock();
                }
            });

            // === Звуковой движок ===
            let audioCtx = null;

            function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return audioCtx;
            }

            function playBeep(frequency, duration, type = 'square', volume = 0.35) {
                try {
                    const ctx = getAudioContext();
                    const now = ctx.currentTime;
                    const oscillator = ctx.createOscillator();
                    const gainNode = ctx.createGain();

                    oscillator.type = type;
                    oscillator.frequency.setValueAtTime(frequency, now);

                    const attackTime = 0.01;
                    const releaseTime = Math.min(0.06, duration * 0.2);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(volume, now + attackTime);
                    gainNode.gain.setValueAtTime(volume, now + duration - releaseTime);
                    gainNode.gain.linearRampToValueAtTime(0, now + duration);

                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);

                    oscillator.start(now);
                    oscillator.stop(now + duration);

                    oscillator.onended = () => {
                        oscillator.disconnect();
                        gainNode.disconnect();
                    };
                } catch (e) {
                    console.warn('Звук не воспроизведён:', e.message);
                }
            }

            // === Логика светофора ===
            function clearAllTimers() {
                timers.forEach(id => clearTimeout(id));
                timers = [];
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
            }

            function resetLights() {
                lightRed.classList.remove('active');
                lightYellow.classList.remove('active');
                lightGreen.classList.remove('active');
                statusText.textContent = 'Нажмите «СТАРТ»';
                statusText.className = 'status';
                countdownDisplay.textContent = '';
                countdownDisplay.className = 'countdown-display';
                isRunning = false;
                btnStart.disabled = false;
                btnReset.disabled = false;
                // Не отпускаем Wake Lock, так как он управляется чекбоксом отдельно
            }

            function getParams() {
                const minDelay = parseFloat(inputMinDelay.value);
                const maxDelay = parseFloat(inputMaxDelay.value);
                const fixedDelay = parseFloat(inputFixedDelay.value);

                if (isNaN(minDelay) || isNaN(maxDelay) || isNaN(fixedDelay)) {
                    alert('Заполните все поля числовыми значениями.');
                    return null;
                }
                if (minDelay < 0 || maxDelay < 0 || fixedDelay < 0) {
                    alert('Значения задержек не могут быть отрицательными.');
                    return null;
                }
                if (minDelay > maxDelay) {
                    alert('Минимальная задержка не может быть больше максимальной.');
                    return null;
                }
                if (fixedDelay < 0.05) {
                    alert('Фиксированная пауза должна быть не менее 0.05 сек.');
                    return null;
                }
                if (maxDelay > 30) {
                    alert('Максимальная задержка не должна превышать 30 секунд.');
                    return null;
                }
                return {
                    minDelay: Math.max(0.05, minDelay),
                    maxDelay: Math.min(30, maxDelay),
                    fixedDelay: Math.max(0.05, Math.min(10, fixedDelay)),
                };
            }

            function getRandomDelay(min, max) {
                const seconds = min + Math.random() * (max - min);
                return Math.round(seconds * 1000);
            }

            function startCountdown(totalMs, phase) {
                countdownTarget = totalMs;
                const startTime = Date.now();

                if (countdownInterval) clearInterval(countdownInterval);

                countdownInterval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const remaining = countdownTarget - elapsed;

                    if (remaining <= 0) {
                        countdownDisplay.textContent = '';
                        countdownDisplay.className = 'countdown-display';
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                        return;
                    }

                    const seconds = (remaining / 1000).toFixed(1);
                    countdownDisplay.textContent = seconds + 'с';

                    if (phase === 'random' && remaining < 1000) {
                        countdownDisplay.className = 'countdown-display warning';
                    } else if (phase === 'fixed') {
                        countdownDisplay.className = 'countdown-display';
                    }
                }, 100);
            }

            function startSequence() {
                if (isRunning) return;

                const params = getParams();
                if (!params) return;

                clearAllTimers();
                resetLights();
                isRunning = true;
                btnStart.disabled = true;
                btnReset.disabled = false;

                const { minDelay, maxDelay, fixedDelay } = params;
                const fixedDelayMs = Math.round(fixedDelay * 1000);
                const randomDelayMs = getRandomDelay(minDelay, maxDelay);

                // 🔴 Красный сигнал
                lightRed.classList.add('active');
                statusText.textContent = 'ПРИГОТОВИТЬСЯ!';
                statusText.className = 'status ready';
                playBeep(440, 0.2, 'square', 0.3);

                startCountdown(fixedDelayMs, 'fixed');

                const timer1 = setTimeout(() => {
                    // 🟡 Жёлтый сигнал
                    lightYellow.classList.add('active');
                    statusText.textContent = 'ВНИМАНИЕ!';
                    statusText.className = 'status set';
                    playBeep(660, 0.15, 'square', 0.35);

                    if (countdownInterval) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                    }
                    countdownDisplay.textContent = '';
                    countdownDisplay.className = 'countdown-display';
                    startCountdown(randomDelayMs, 'random');

                    const timer2 = setTimeout(() => {
                        // 🟢 Зелёный сигнал
                        lightGreen.classList.add('active');
                        statusText.textContent = 'СТАРТ! ПОЕХАЛИ!';
                        statusText.className = 'status go';
                        countdownDisplay.textContent = 'GO!';
                        countdownDisplay.className = 'countdown-display go';
                        playBeep(880, 0.45, 'square', 0.4);

                        const timer3 = setTimeout(() => {
                            resetLights();
                        }, 3000);
                        timers.push(timer3);

                    }, randomDelayMs);
                    timers.push(timer2);

                }, fixedDelayMs);
                timers.push(timer1);

                console.log(
                    `🏁 Старт:\n` +
                    `   🔴 Красный — немедленно\n` +
                    `   🟡 Жёлтый — через ${fixedDelay.toFixed(1)} сек\n` +
                    `   🟢 Зелёный — через случайные ${(randomDelayMs / 1000).toFixed(1)} сек ` +
                    `(диапазон: ${minDelay.toFixed(1)}–${maxDelay.toFixed(1)} сек)`
                );
            }

            function resetSequence() {
                clearAllTimers();
                resetLights();
                console.log('🔄 Сброс выполнен.');
            }

            btnStart.addEventListener('click', startSequence);
            btnReset.addEventListener('click', resetSequence);

            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.code === 'Space') {
                    e.preventDefault();
                    if (!isRunning) startSequence();
                } else if (e.key === 'r' || e.key === 'R' || e.key === 'Escape') {
                    e.preventDefault();
                    resetSequence();
                }
            });

            [inputMinDelay, inputMaxDelay, inputFixedDelay].forEach(input => {
                input.addEventListener('input', () => {
                    const val = parseFloat(input.value);
                    if (!isNaN(val) && val < 0) input.value = '0.1';
                });
                input.addEventListener('blur', () => {
                    const val = parseFloat(input.value);
                    if (isNaN(val) || val < 0) input.value = input.dataset.defaultValue || '1.0';
                    if (!isNaN(parseFloat(input.value))) {
                        input.value = parseFloat(input.value).toFixed(1);
                    }
                });
                input.dataset.defaultValue = input.value;
            });

            resetLights();
            console.log('🏁 Готово! Пробел — старт, Esc/R — сброс.');
        })();
    </script>
</body>
</html>
